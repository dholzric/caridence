<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Caridence</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #15233a 0%, #0a0f1a 60%, #070a12 100%);
      color: #e6edf6;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 2rem;
    }
    .wrap { max-width: 640px; }
    .mark {
      display: inline-flex; align-items: center; gap: .6rem;
      font-weight: 700; letter-spacing: -.02em; font-size: 1.05rem;
      color: #9db4d4; text-transform: uppercase; letter-spacing: .18em;
    }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: #3b82f6; box-shadow: 0 0 16px #3b82f6; }
    h1 { font-size: clamp(2.2rem, 6vw, 3.6rem); line-height: 1.05; margin: 1.4rem 0 .6rem; letter-spacing: -.03em; }
    h1 .accent { color: #60a5fa; }
    p.lead { font-size: clamp(1.05rem, 2.4vw, 1.25rem); color: #9fb0c6; margin: 0 auto 2rem; max-width: 30rem; }
    .badge {
      display: inline-block; font-size: .72rem; letter-spacing: .14em; text-transform: uppercase;
      color: #7dd3fc; border: 1px solid #1e3a5f; background: #0d1830; border-radius: 999px; padding: .4rem .9rem;
    }
    footer { margin-top: 2.6rem; font-size: .8rem; color: #56657c; }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="mark"><span class="dot"></span> Caridence</div>
    <h1>Cited proof for <span class="accent">every vehicle.</span></h1>
    <p class="lead">A phone walkaround becomes an objective damage report &mdash; every finding pinned to the exact frame it was seen in.</p>
    <span class="badge">Private preview &middot; Building now</span>
    <footer>&copy; Caridence</footer>
  </main>
</body>
</html>
